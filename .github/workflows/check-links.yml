name: Check Links

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate internal markdown links
        run: python3 scripts/check_links.py
